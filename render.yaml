services:
  - type: web
    name: todo-backend
    runtime: node
    rootDir: server
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: SPREADSHEET_ID
        sync: false
      - key: GOOGLE_SERVICE_ACCOUNT_KEY_FILE
        value: /etc/secrets/service-account-key.json
      - key: PORT
        value: 3001
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGIN
        sync: false
      # プロジェクト招待メールの送信に使用（RenderはSMTPポートをブロックするためResend経由で送信）
      - key: RESEND_API_KEY
        sync: false
      - key: MAIL_FROM
        sync: false
      # AIタスク細分化機能で使用（不要なら空のままでよい）
      - key: AI_PROVIDER
        sync: false
      - key: OPENAI_API_KEY
        sync: false

  - type: web
    name: todo-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
